name: Activity Dashboard

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gather activity data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const org = 'riverside-pirates';
            const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const since = sevenDaysAgo.toISOString();

            // Fetch all repos in the org
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org,
              type: 'all',
              per_page: 100,
            });

            const recentPRs = [];
            const recentBounties = [];
            const contributorSet = new Set();

            for (const repo of repos) {
              // Fetch recent merged PRs
              try {
                const pulls = await github.rest.pulls.list({
                  owner: org,
                  repo: repo.name,
                  state: 'closed',
                  sort: 'updated',
                  direction: 'desc',
                  per_page: 50,
                });

                for (const pr of pulls.data) {
                  if (pr.merged_at && new Date(pr.merged_at) >= sevenDaysAgo) {
                    recentPRs.push({
                      title: pr.title,
                      repo: repo.name,
                      author: pr.user.login,
                      url: pr.html_url,
                      mergedAt: pr.merged_at,
                    });
                    contributorSet.add(pr.user.login);
                  }
                }
              } catch (e) {
                console.log(`Could not fetch PRs for ${repo.name}: ${e.message}`);
              }

              // Fetch recently closed issues (bounties)
              try {
                const issues = await github.rest.issues.listForRepo({
                  owner: org,
                  repo: repo.name,
                  state: 'closed',
                  since,
                  per_page: 50,
                });

                for (const issue of issues.data) {
                  // Skip pull requests (they appear in the issues endpoint too)
                  if (issue.pull_request) continue;

                  if (issue.closed_at && new Date(issue.closed_at) >= sevenDaysAgo) {
                    recentBounties.push({
                      title: issue.title,
                      repo: repo.name,
                      status: issue.state_reason || 'completed',
                      url: issue.html_url,
                    });

                    if (issue.assignee) {
                      contributorSet.add(issue.assignee.login);
                    }
                  }
                }
              } catch (e) {
                console.log(`Could not fetch issues for ${repo.name}: ${e.message}`);
              }
            }

            // Sort PRs by merge date descending
            recentPRs.sort((a, b) => new Date(b.mergedAt) - new Date(a.mergedAt));

            const dashboard = {
              lastUpdated: new Date().toISOString(),
              recentPRs,
              recentBounties,
              contributors: [...contributorSet].sort(),
            };

            // Ensure dashboard directory exists
            const dashboardDir = path.join(process.env.GITHUB_WORKSPACE, 'dashboard');
            if (!fs.existsSync(dashboardDir)) {
              fs.mkdirSync(dashboardDir, { recursive: true });
            }

            const outputPath = path.join(dashboardDir, 'data.json');
            fs.writeFileSync(outputPath, JSON.stringify(dashboard, null, 2) + '\n');
            console.log(`Dashboard data written to ${outputPath}`);
            console.log(`PRs: ${recentPRs.length}, Bounties: ${recentBounties.length}, Contributors: ${contributorSet.size}`);

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update activity dashboard data"
            git push
          fi
